name: build tauri

on:
  # 允许手动触发构建（这就是“Run workflow”按钮的来源）
  workflow_dispatch:
  # 推送到 release 分支时触发
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      # 即使某个平台构建失败，也继续构建其他平台
      fail-fast: false
      matrix:
        include:
          # -------------------- macOS --------------------
          - platform: 'macos-latest'
            name: 'macOS (Apple Silicon)'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            name: 'macOS (Intel)'
            args: '--target x86_64-apple-darwin'

          # -------------------- Linux --------------------
          - platform: 'ubuntu-22.04'
            name: 'Linux (x64)'
            args: ''
          - platform: 'ubuntu-22.04-arm'
            name: 'Linux (ARM)'
            args: ''

          # -------------------- Windows --------------------
          - platform: 'windows-latest'
            name: 'Windows'
            args: ''

          # -------------------- Android --------------------
          - platform: 'ubuntu-22.04'
            name: 'Android (Universal APK)' # 在Actions界面显示的清晰名称
            args: '--apk --universal'
            android: true # 自定义标记，用于判断是否为Android构建

    runs-on: ${{ matrix.platform }}
    # 自定义构建任务的显示名称，格式如 "publish-tauri (macOS (Apple Silicon))"
    name: ${{ matrix.name || matrix.platform }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------- 环境准备：Ubuntu 桌面依赖 --------------------
      # 仅在 Ubuntu 平台且非 Android 构建时运行
      - name: 安装 Linux 桌面依赖
        if: startsWith(matrix.platform, 'ubuntu') && !matrix.android
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # -------------------- 环境准备：Android 专属配置 --------------------
      - name: 设置 Java JDK
        if: matrix.android
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Android SDK
        if: matrix.android
        uses: android-actions/setup-android@v3

      - name: 安装 NDK
        if: matrix.android
        run: sdkmanager "ndk;25.2.9519653"

      # Android 签名配置 (严格按照官方文档逻辑)
      - name: 配置 Android 签名
        if: matrix.android
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # 确保目录存在
          mkdir -p src-tauri/gen/android
          cd src-tauri/gen/android
          
          # 生成 keystore.properties 文件
          echo "keyAlias=${ANDROID_KEY_ALIAS}" > keystore.properties
          echo "password=${ANDROID_KEY_PASSWORD}" >> keystore.properties
          
          # 解码证书文件
          base64 -d <<< "${ANDROID_KEY_BASE64}" > $RUNNER_TEMP/keystore.jks
          
          # 写入证书路径
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      # -------------------- 通用环境准备 --------------------
      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: 安装 Rust stable 版本
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{
            (matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin') ||
            (matrix.android && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android') ||
            ''
        }}

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 安装前端依赖
        run: yarn install

      # -------------------- 执行构建 --------------------
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
