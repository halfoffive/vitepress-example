name: 'build-tauri'

on:
  # 手动触发
  workflow_dispatch:
  # 推送到 release 分支时触发
  push:
    branches:
      - release

jobs:
  # ==================== 桌面端构建 ====================
  desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            name: 'macOS (Apple Silicon)'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            name: 'macOS (Intel)'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            name: 'Linux (x64)'
            args: ''
          - platform: 'ubuntu-22.04-arm'
            name: 'Linux (ARM)'
            args: ''
          - platform: 'windows-latest'
            name: 'Windows'
            args: ''

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.name }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Linux 桌面依赖
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: 安装 Rust stable 版本
        uses: dtolnay/rust-toolchain@stable
        with:
          # [关键修复] 强制单行，不可换行
          targets: ${{ (matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin') || '' }}

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 安装前端依赖
        run: npm install

      # 桌面构建：使用 tauri-action
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ==================== Android 构建 ====================
  android:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    name: 'Android (APK)'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----- Java / Android 环境 -----
      - name: 设置 Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Android NDK 并设置环境变量
        env:
          NDK_VERSION: '25.2.9519653'
        run: |
          sdkmanager "ndk;${NDK_VERSION}"
          echo "ANDROID_HOME=${ANDROID_HOME}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> $GITHUB_ENV

      # ----- Rust 环境 -----
      - name: 安装 Rust stable 版本
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android'

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ----- Node 环境 -----
      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: 安装前端依赖
        run: npm install

      # ----- Android 签名配置 -----
      - name: 配置 Android 签名
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p src-tauri/gen/android
          cd src-tauri/gen/android
          echo "keyAlias=${ANDROID_KEY_ALIAS}" > keystore.properties
          echo "password=${ANDROID_KEY_PASSWORD}" >> keystore.properties
          base64 -d <<< "${ANDROID_KEY_BASE64}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      # ----- Android 构建 (手动执行命令) -----
      - name: 构建 Android APK
        run: npm run tauri android build -- --apk --split-per-abi

      # ----- 上传产物到 Release -----
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          tauriScript: 'true' # 不执行构建命令，仅上传产物
