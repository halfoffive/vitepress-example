name: 'build-tauri'

on:
  # 手动触发
  workflow_dispatch:
  # 推送到 release 分支时触发
  push:
    branches:
      - release

jobs:
  # ==================== 桌面端构建 ====================
  desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            name: 'macOS (Apple Silicon)'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            name: 'macOS (Intel)'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            name: 'Linux (x64)'
            args: ''
          - platform: 'ubuntu-22.04-arm'
            name: 'Linux (ARM)'
            args: ''
          - platform: 'windows-latest'
            name: 'Windows'
            args: ''

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.name }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Linux 桌面依赖
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: 安装 Rust stable 版本
        uses: dtolnay/rust-toolchain@stable
        with:
          # [关键修复] 强制单行，不可换行
          targets: ${{ (matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin') || '' }}

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 安装前端依赖
        run: npm install

      # 桌面构建：使用 tauri-action
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

    # ==================== Android 构建 ====================
  android:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    name: 'Android (APK)'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----- Java / Android 环境 -----
      - name: 设置 Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Android NDK 并设置环境变量
        env:
          NDK_VERSION: '25.2.9519653'  # 按你实际/官方文档版本修改
        run: |
          sdkmanager "ndk;${NDK_VERSION}"
          echo "ANDROID_HOME=${ANDROID_HOME}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> $GITHUB_ENV

      # ----- Rust 环境 -----
      - name: 安装 Rust stable 版本
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android'

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ----- Node 环境 -----
      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: 安装前端依赖
        run: npm install

      # ----- Android 签名配置 -----
      - name: 配置 Android 签名
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # 确保 android 目录存在
          mkdir -p src-tauri/gen/android
          cd src-tauri/gen/android

          # 写入 keystore.properties
          echo "keyAlias=${ANDROID_KEY_ALIAS}" > keystore.properties
          echo "password=${ANDROID_KEY_PASSWORD}" >> keystore.properties

          # 解码 Base64 证书到临时目录
          base64 -d <<< "${ANDROID_KEY_BASE64}" > $RUNNER_TEMP/keystore.jks

          # 写入 storeFile 路径
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      # ----- Android 构建（手动调用命令） -----
      - name: 构建 Android APK
        run: npm run tauri android build -- --apk --split-per-abi

      # ----- 从 src-tauri/tauri.conf.json 读取版本号 -----
      - name: 读取应用版本
        id: version
        run: |
          # 这里路径对应你说的 “tauri配置文件在 src-tauri/”
          VERSION=$(jq -r '.version // empty' src-tauri/tauri.conf.json)
          if [ -z "$VERSION" ]; then
            echo "::error::无法从 src-tauri/tauri.conf.json 读取 .version 字段"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # ----- 找到 Release 的 upload_url -----
      - name: 获取 Release 上传地址
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 注意：这里假设桌面端 job 已经创建了 app-v<VERSION> 的 Release
          TAG="app-v${{ steps.version.outputs.VERSION }}"
          REPO="${{ github.repository }}"

          # 获取该 tag 对应的 release 信息
          RESPONSE=$(curl -sH "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")

          # 从响应中提取 upload_url
          UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.upload_url // empty')
          if [ -z "$UPLOAD_URL" ]; then
            echo "::error::未找到 tag=$TAG 对应的 Release，或 release 没有 upload_url"
            echo "RESPONSE: $RESPONSE"
            exit 1
          fi

          # GitHub 返回的 upload_url 类似：
          # https://uploads.github.com/repos/owner/repo/releases/123/assets{?name,label}
          # 我们需要去掉 {?name,label} 后缀，后面自己拼 ?name=xxx
          UPLOAD_URL="${UPLOAD_URL%\{?name,label\}}"
          echo "UPLOAD_URL=$UPLOAD_URL" >> $GITHUB_OUTPUT

      # ----- 上传 4 个 APK 到 Release -----
      - name: 上传 APK 到 GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPLOAD_URL="${{ steps.release.outputs.UPLOAD_URL }}"
          REPO="${{ github.repository }}"

          # 遍历 4 个 ABI
          for abi in arm64 arm x86 x86_64; do
            APK="src-tauri/gen/android/app/build/outputs/apk/$abi/release/app-$abi-release.apk"
            if [ -f "$APK" ]; then
              NAME="app-$abi-release.apk"
              echo "上传 $NAME ..."

              # 参考 GitHub 文档的上传示例：
              # https://uploads.github.com/repos/{owner}/{repo}/releases/{release_id}/assets?name=example.zip
              # 使用 --data-binary 以二进制方式上传
              curl -sL \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -H "Content-Type: application/vnd.android.package-archive" \
                "${UPLOAD_URL}?name=$NAME" \
                --data-binary "@$APK"
            else
              echo "::warning::未找到 APK 文件：$APK，跳过"
            fi
          done
